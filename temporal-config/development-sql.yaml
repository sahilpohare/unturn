limit.maxIDLength:
  - value: 255
    constraints: {}

system.forceSearchAttributesCacheRefreshOnRead:
  - value: true
    constraints: {}

# Expose per-task-queue metrics so Prometheus can drive HPA
system.enableReadFromSecondary:
  - value: false
    constraints: {}

frontend.enableActivityEagerExecution:
  - value: true
    constraints: {}
